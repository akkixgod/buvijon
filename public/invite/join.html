<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Buvijon — oila taklifi</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 420px; margin: 48px auto; padding: 0 16px; text-align: center; color: #1f2937; }
    a { color: #4f46e5; }
  </style>
  <script>
    (function () {
      var parts = window.location.pathname.split('/join/');
      var code = (parts[1] || '').split('/')[0].split('?')[0].trim().toUpperCase();
      if (!/^[A-Z0-9]{12}$/.test(code)) {
        document.title = 'Noto\'g\'ri havola';
        return;
      }
      var ref = new URLSearchParams(window.location.search).get('ref');
      var appPath = 'join/' + code + (ref ? '?ref=' + encodeURIComponent(ref) : '');
      var appUrl = 'buvijon://' + appPath;
      var intentUrl = 'intent://' + appPath + '#Intent;scheme=buvijon;package=uz.buvijon.app;S.browser_fallback_url=' +
        encodeURIComponent('https://play.google.com/store/apps/details?id=uz.buvijon.app') + ';end';
      var playStore = 'https://play.google.com/store/apps/details?id=uz.buvijon.app';
      var isAndroid = /Android/i.test(navigator.userAgent);
      window.location.replace(isAndroid ? intentUrl : appUrl);
      setTimeout(function () { window.location.replace(playStore); }, 1800);
    })();
  </script>
</head>
<body>
  <h1>Buvijon</h1>
  <p>Ilova ochilmoqda…</p>
  <p><a href="https://play.google.com/store/apps/details?id=uz.buvijon.app">Play Store</a></p>
</body>
</html>
